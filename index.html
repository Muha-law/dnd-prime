<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DND Prime — Properties · Short Lets · Cleaning · Maintenance</title>
    <meta
      name="description"
      content="DND Prime — one team for your property needs. Homes to buy and rent, serviced short lets, professional cleaning, and reliable property maintenance. Covering Birmingham & surrounding areas."
    />
    <meta name="theme-color" content="#0a0a0a" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!--
      TAWK.TO LIVE CHAT
      ─────────────────
      1. Go to https://www.tawk.to and create a free account
      2. Add a new Property → name it "DND Prime"
      3. Copy your Property ID and Widget ID from:
         Dashboard → Administration → Chat Widget → Direct Chat Link
         The link looks like: https://tawk.to/chat/PROPERTY_ID/WIDGET_ID
      4. Replace YOUR_PROPERTY_ID and YOUR_WIDGET_ID below with those values
      5. Download the Tawk.to mobile app — the team responds to chats from there
    -->
    <script type="text/javascript">
      var Tawk_API = Tawk_API || {}, Tawk_LoadTime = new Date();
      (function () {
        var s1 = document.createElement("script"), s0 = document.getElementsByTagName("script")[0];
        s1.async = true;
        s1.src = 'https://embed.tawk.to/YOUR_PROPERTY_ID/YOUR_WIDGET_ID';
        s1.charset = 'UTF-8';
        s1.setAttribute('crossorigin', '*');
        s0.parentNode.insertBefore(s1, s0);
      })();
    </script>
  </body>
</html>
